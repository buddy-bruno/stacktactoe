# StackTacToe — Netlify (Repo-Root)
# Build läuft im Ordner "web" (Next.js).

[build]
  base    = "web"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Next.js explizit mit Plugin — behebt 404 / "Page not found"
[[plugins]]
  package = "@netlify/plugin-nextjs"
